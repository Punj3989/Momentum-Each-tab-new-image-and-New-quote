<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum - Har Naya Tab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bg"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1 id="greeting">Good Morning</h1>
    <p id="time">12:00:00</p>
    <p id="date">Monday, 1 Jan 2026</p>
    <h2 id="quote">“Believe you can and you're halfway there.”</h2>
    <p id="author">— Theodore Roosevelt</p>
    <div class="focus-box">
      <input type="text" id="focusInput" placeholder="What's your main focus today?" />
      <button id="focusBtn">Set Focus</button>
    </div>
    <p id="focusDisplay"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
